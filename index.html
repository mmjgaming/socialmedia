<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MMJ Social App</title>

<style>
body { margin:0; font-family:Arial; display:flex; height:100vh; }
#sidebar { width:250px; background:#111; color:white; padding:10px; overflow:auto; }
#chatArea { flex:1; display:flex; flex-direction:column; }
#chatBox { flex:1; padding:10px; overflow:auto; }
#inputArea { display:flex; }
#inputArea input { flex:1; padding:10px; }
#inputArea button { padding:10px; }

.myMsg { text-align:right; margin:5px; color:green; }
.otherMsg { text-align:left; margin:5px; color:blue; }

.user, .group {
  padding:8px;
  border-bottom:1px solid #333;
  cursor:pointer;
}
</style>
</head>

<body onload="init()">

<div id="sidebar">
  <h3>Users</h3>
  <div id="userList"></div>

  <h3>Groups</h3>
  <button onclick="createGroup()">+ New Group</button>
  <div id="groupList"></div>

  <button onclick="logout()">Logout</button>
</div>

<div id="chatArea">
  <div id="chatBox"></div>

  <div id="inputArea">
    <input id="messageInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/chat.js"></script>
<script src="js/users.js"></script>
<script src="js/groups.js"></script>

<script>
async function init(){
  const user = await getCurrentUser();
  if(!user) window.location = "login.html";

  loadUsers();
  loadGroups();
}
</script>

</body>
</html>
